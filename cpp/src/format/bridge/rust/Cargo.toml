
[package]
name = "rust-bridge"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
# common dependencies
anyhow = "1.0.99"
futures = "0.3.31"
paste = "1.0.15"
take_mut = "0.2.2"
async-compat = "0.2.5"
tokio = { version = "1.23", features = ["full"] }
snafu = "0.8"

# Arrow Ecosystem
arrow = "56.2.0"
arrow-array = {version = "56.2.0", features = ["ffi"]}
arrow-data = {version = "56.2.0", features = ["ffi"]}
arrow-schema = "56.2.0"

# Vortex Ecosystem
vortex = "0.56.0"
vortex-io = { version = "0.56.0", features = ["tokio"] }

# Lance Ecosystem
lance = "1.0.0"
lance-encoding = "1.0.0"
lance-index = "1.0.0"
lance-io = "1.0.0"
lance-table = "1.0.0"

# Iceberg Ecosystem
bytes = "1"
iceberg = { version = "0.8", features = ["storage-azdls", "storage-gcs"] }
parquet = { version = "56.2.0", features = ["arrow"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = "0.4"
uuid = { version = "1", features = ["v7"] }

# AWS SDK (for Lance AssumeRole credential provider)
aws-config = "1"
aws-credential-types = "1"
object_store = { version = "0.12", features = ["aws", "gcp"] }

# HTTP client for the GCP Service Account Impersonation flow in
# gcp_impersonation.rs (calls metadata.google.internal + iamcredentials.googleapis.com).
# Already in the transitive tree via lance-io / iceberg / reqsign; pinned here
# to match those (0.12.x) and to opt into rustls (the workspace TLS choice).
async-trait = "0.1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
# `url::Url` is named in lance-io's ObjectStoreProvider::new_store signature
# we implement; keep as a direct dep rather than leaning on transitive re-export.
url = "2"

# CXX bridge
cxx = "1.0.184"

[dev-dependencies]
tempfile = "3"

[build-dependencies]
cxx-build = "1.0.184"
