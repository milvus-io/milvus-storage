
[package]
name = "rust-bridge"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["staticlib"]

[dependencies]
# common dependencies
anyhow = "1.0.99"
futures = "0.3.31"
paste = "1.0.15"
take_mut = "0.2.2"
async-compat = "0.2.5"
async-trait = "0.1"
async-stream = "0.3"
tokio = { version = "1.23", features = ["full"] }
snafu = "0.8"

# Arrow Ecosystem
arrow = "56.2.0"
arrow-array = {version = "56.2.0", features = ["ffi"]}
arrow-data = {version = "56.2.0", features = ["ffi"]}
arrow-schema = "56.2.0"

# Vortex Ecosystem
# Actual version is 0.56.0, but set to 0.1.0 to match the patched source in _vortex_patched/
vortex = { version = "0.1.0", features = ["tokio"] }

# Lance Ecosystem
lance = "1.0.0"
lance-encoding = "1.0.0"
lance-index = "1.0.0"
lance-io = "1.0.0"
lance-table = "1.0.0"

# Iceberg Ecosystem
iceberg = "0.8"
parquet = { version = "56.2.0", features = ["arrow"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = "0.4"
uuid = { version = "1", features = ["v7"] }

# CXX bridge
cxx = "1.0.184"

[dev-dependencies]
tempfile = "3"

[build-dependencies]
cxx-build = "1.0.184"

[patch.crates-io]
vortex = { path = "_vortex_patched/vortex" }
vortex-io = { path = "_vortex_patched/vortex-io" }
vortex-array = { path = "_vortex_patched/vortex-array" }
vortex-file = { path = "_vortex_patched/vortex-file" }
vortex-layout = { path = "_vortex_patched/vortex-layout" }
vortex-scan = { path = "_vortex_patched/vortex-scan" }
vortex-alp = { path = "_vortex_patched/encodings/alp" }
vortex-bytebool = { path = "_vortex_patched/encodings/bytebool" }
vortex-datetime-parts = { path = "_vortex_patched/encodings/datetime-parts" }
vortex-decimal-byte-parts = { path = "_vortex_patched/encodings/decimal-byte-parts" }
vortex-fastlanes = { path = "_vortex_patched/encodings/fastlanes" }
vortex-sequence = { path = "_vortex_patched/encodings/sequence" }
vortex-zigzag = { path = "_vortex_patched/encodings/zigzag" }
